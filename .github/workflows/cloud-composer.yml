name: Deploy to Composer

on:
  push:
    branches:
      - master
    paths:
      - "infra/airflow/dags/**"
      - "src/**"
      - "config/settings.yaml"
      - "infra/terraform/Dockerfile.composer"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION_NAME: ${{ vars.GCP_REGION_NAME }}
  SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
  IDENTITY_PROVIDER_NAME: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}
  COMPOSER_NAME: ${{ vars.GCP_COMPOSER_ENVIRONMENT_NAME }}
  REPOSITORY_NAME: ${{ vars.GCP_REPOSITORY_NAME }}
  IMAGE_NAME: ${{ vars.GCP_COMPOSER_IMAGE_NAME }}
  GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: contains(github.event.commits[0].modified, 'infra/terraform/Dockerfile.composer') || contains(join(github.event.commits.*.modified, ' '), 'Dockerfile.composer')
    outputs:
      image: ${{ steps.build.outputs.image }}
      image_built: ${{ steps.build.outputs.image_built }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER_NAME }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION_NAME }}-docker.pkg.dev --quiet

      - name: Build & Push Image
        id: build
        run: |
          IMAGE=${{ env.REGION_NAME }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/${{ env.IMAGE_NAME }}
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build \
            -f infra/terraform/Dockerfile.composer \
            -t $IMAGE:$SHORT_SHA \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:$SHORT_SHA
          docker push $IMAGE:latest
          echo "image=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_built=true" >> $GITHUB_OUTPUT

  deploy:
    name: Sync DAGs & Update Composer
    runs-on: ubuntu-latest
    needs: build
    if: always() && !failure() && !cancelled()

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER_NAME }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Update Composer custom image
        if: needs.build.outputs.image_built == 'true'
        run: |
          gcloud composer environments update ${{ env.COMPOSER_NAME }} \
            --location=${{ env.REGION_NAME }} \
            --project=${{ env.PROJECT_ID }} \
            --update-airflow-configs=core-custom_image=${{ needs.build.outputs.image }}

      - name: Get Composer DAGs bucket
        id: composer
        run: |
          DAGS_BUCKET=$(gcloud composer environments describe ${{ env.COMPOSER_NAME }} \
            --location=${{ env.REGION_NAME }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(config.dagGcsPrefix)")
          echo "dags_bucket=$DAGS_BUCKET" >> $GITHUB_OUTPUT

      - name: Sync DAGs
        run: |
          gcloud storage cp -r infra/airflow/dags/* gs://europe-west3-ai-compute-arb-477a272b-bucket/dags/

      - name: Sync src/
        run: |
          gcloud storage cp -r src/* gs://europe-west3-ai-compute-arb-477a272b-bucket/dags/src/

      - name: Upload settings
        run: |
          gcloud storage cp config/settings.yaml gs://${{ env.GCS_BUCKET_NAME }}/config/settings.yaml