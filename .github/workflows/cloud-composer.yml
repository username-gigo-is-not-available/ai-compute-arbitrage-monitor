name: Deploy DAGs to Composer

on:
  push:
    branches:
      - master
    paths:
      - "infra/airflow/dags/**"
      - "src/**"
      - "config/settings.yaml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION_NAME: ${{ vars.GCP_REGION_NAME }}
  SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_COMPOSER_ENVIRONMENT_SERVICE_ACCOUNT_EMAIL }}
  IDENTITY_PROVIDER_NAME: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}
  COMPOSER_NAME: ${{ vars.GCP_COMPOSER_ENVIRONMENT_NAME }}
  BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}

jobs:
  deploy-dags:
    name: Deploy DAGs
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER_NAME }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}

      - name: Get Composer DAGs bucket
        id: composer
        run: |
          DAGS_BUCKET=$(gcloud composer environments describe ${{ env.COMPOSER_NAME }} \
            --location=${{ env.REGION_NAME }} \
            --format="value(config.dagGcsPrefix)")
          echo "dags_bucket=$DAGS_BUCKET" >> $GITHUB_OUTPUT

      - name: Sync DAGs
        run: |
          gsutil -m rsync -r -d infra/airflow/dags/ ${{ steps.composer.outputs.dags_bucket }}/

      - name: Sync src/
        run: |
          gsutil -m rsync -r -d src/ ${{ steps.composer.outputs.dags_bucket }}/src/

      - name: Upload settings
        run: |
          gsutil cp config/settings.yaml gs://${{ env.GCS_BUCKET_NAME }}/config/settings.yaml
