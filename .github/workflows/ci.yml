name: Build & Push Dataproc Image

on:
  push:
    branches:
      - main
    paths:
      - "src/refine/**"
      - "src/config/**"
      - "src/common/**"
      - "pyproject.toml"
      - "uv.lock"
      - "infra/gcp/Dockerfile"

env:
  REGION: europe-west3
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPOSITORY_NAME: gpu-compute-arbitrage-monitor-registry
  IMAGE_NAME: gpu-compute-arbitrage-monitor-dataproc-image

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/${{ env.IMAGE_NAME }}
          docker build \
            -f infra/gcp/Dockerfile \
            -t $IMAGE:$(git rev-parse --short HEAD) \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:$(git rev-parse --short HEAD)
          docker push $IMAGE:latest