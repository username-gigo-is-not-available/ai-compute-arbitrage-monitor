execution_type: "local"

apis:
  vast_ai:
    enabled: true
    base_url: "https://console.vast.ai/api/v0"
    limit: 10000

  exchange_rate:
    enabled: true
    base_url: "https://v6.exchangerate-api.com/v6"
    from_currency: "USD"
    to_currency: "MKD"

  evn:
    enabled: true
    tariff_tiers_url: "https://www.evn.mk/Invoices.aspx"
    tariff_system_url: "https://www.evn.mk/AboutInvoices/TariffSystem.aspx"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

http:
  timeout_seconds: 30
  retry_count: 5
  retry_delay_seconds: 60

gcp:
  project_id: "ai-compute-arbitrage-monitor"
  region_name: "europe-west3"
  gcs:
    bucket_name: "ai-compute-arbitrage-monitor-lake"
  dataproc:
    image_tag: "europe-west3-docker.pkg.dev/ai-compute-arbitrage-monitor/ai-compute-arbitrage-monitor-repository/ai-compute-arbitrage-monitor-dataproc-image:latest"
    runtime_packages: ["common", "config", "refine"]
    subnetwork_name: "projects/ai-compute-arbitrage-monitor/regions/europe-west3/subnetworks/ai-compute-arbitrage-monitor-subnet"
    service_account_email: "dataproc-sa@ai-compute-arbitrage-monitor.iam.gserviceaccount.com"
  cloud_run:
    job_name: "ai-compute-arbitrage-monitor-dbt-job"
  composer:
    runtime_packages: ["common", "config", "ingest", "serializers"]

dbt:
  local:
    project_directory_path: "/opt/airflow/src/transform"
    profiles_directory_path: "/opt/airflow/src/transform"
    target_directory_path: "/tmp/target"
  gcp:
    project_directory_path: "/app/transform"
    profiles_directory_path: "/app/transform"
    target_directory_path: "/tmp/target"
