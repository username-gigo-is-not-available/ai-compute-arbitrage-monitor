      - name: avg_profit_per_tflop_household_1_high_usd
        description: "Average profit per TFLOP in USD under household high tariff block 1"
      - name: avg_profit_per_tflop_household_2_high_usd
        description: "Average profit per TFLOP in USD under household high tariff block 2"
      - name: avg_profit_per_tflop_household_3_high_usd
