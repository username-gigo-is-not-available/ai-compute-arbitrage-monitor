        description: "Average profit per TFLOP in USD under household low tariff"
      - name: avg_profit_per_tflop_business_high_usd
        description: "Average profit per TFLOP in USD under business high tariff"
      - name: avg_profit_per_tflop_business_low_usd
        description: "Average profit per TFLOP in USD under business low tariff"
      - name: min_profit_per_tflop_household_1_high_usd
        description: "Minimum profit per TFLOP in USD under household high tariff block 1"
      - name: min_profit_per_tflop_household_2_high_usd
        description: "Minimum profit per TFLOP in USD under household high tariff block 2"
      - name: min_profit_per_tflop_household_3_high_usd
