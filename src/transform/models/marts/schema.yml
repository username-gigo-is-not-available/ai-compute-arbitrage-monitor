      - name: max_profit_per_tflop_household_3_high_usd
        description: "Maximum profit per TFLOP in USD under household high tariff block 3"
      - name: max_profit_per_tflop_household_4_high_usd
        description: "Maximum profit per TFLOP in USD under household high tariff block 4"
      - name: max_profit_per_tflop_household_low_usd
        description: "Maximum profit per TFLOP in USD under household low tariff"
      - name: max_profit_per_tflop_business_high_usd
        description: "Maximum profit per TFLOP in USD under business high tariff"
      - name: max_profit_per_tflop_business_low_usd
        description: "Maximum profit per TFLOP in USD under business low tariff"

  - name: mart_gpu_model_summary
    description: >
      Summary profitability statistics aggregated by GPU model and offer type.
      Current offers only (valid_to is null). Includes profitability rates across
      all EVN tariff scenarios, host quality metrics, and per-GPU normalized averages.
      One row per (gpu_model_name, offer_type).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - offer_type
            - gpu_architecture
            - gpu_model_name
            - gpu_memory_gb
            - tflops_per_gpu
    columns:
      - name: offer_type
        description: "Offer type e.g. on_demand, reserved, bid"
        tests:
          - not_null
      - name: gpu_architecture
        description: "GPU architecture family"
        tests:
          - not_null
      - name: gpu_model_name
        description: "GPU model name"
        tests:
          - not_null
      - name: gpu_memory_gb
        description: "GPU VRAM in gigabytes - part of grain to separate RTX 4090 16GB vs 32GB"
      - name: tflops_per_gpu
        description: "TFLOPS per GPU - part of grain"
      - name: gpu_tdp_watts
        description: "GPU TDP in watts - part of grain"

      - name: total_offer_observations
        description: "Total number of current offer snapshots in this group"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: avg_kwh_per_tflop
        description: "Average energy efficiency ratio - kWh per TFLOP"

      - name: avg_revenue_per_gpu_usd_per_hr
        description: "Average revenue per GPU in USD/hr"

      - name: pct_profitable_household_1_high
        description: "Percentage of offers profitable under household high tariff block 1"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_profitable_household_1_high <= 100"
              config:
                severity: warn
      - name: pct_profitable_household_2_high
        description: "Percentage of offers profitable under household high tariff block 2"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_profitable_household_2_high <= 100"
              config:
                severity: warn
      - name: pct_profitable_household_3_high
        description: "Percentage of offers profitable under household high tariff block 3"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_profitable_household_3_high <= 100"
              config:
                severity: warn
      - name: pct_profitable_household_4_high
        description: "Percentage of offers profitable under household high tariff block 4"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_profitable_household_4_high <= 100"
              config:
                severity: warn
      - name: pct_profitable_business_high
        description: "Percentage of offers profitable under business high tariff"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_profitable_business_high <= 100"
              config:
                severity: warn
      - name: pct_profitable_business_low
        description: "Percentage of offers profitable under business low tariff"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_profitable_business_low <= 100"
              config:
                severity: warn

      - name: pct_verified
        description: "Percentage of offers with verified hosts"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_verified <= 100"
              config:
                severity: warn

      - name: pct_available
        description: "Percentage of offers currently not rented"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and pct_available <= 100"
              config:
                severity: warn

      - name: avg_reliability_score
        description: "Average host reliability score"

      - name: last_seen_at
        description: "Most recent ingestion timestamp in this group"
        tests:
          - not_null