version: 2

models:
  - name: mart_arbitrage_opportunities
    description: >
      Current arbitrage opportunities ranked globally by profit per TFLOP under the business
      high tariff. Filtered to verified, rentable, unrented offers with valid compute metrics.
      One row per offer instance. Partitioned rank per offer_type.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - offer_type
            - arbitrage_rank
    columns:
      - name: arbitrage_rank
        description: "Rank by profit_per_tflop_business_high_usd descending within offer_type - rank 1 is the best opportunity"
        tests:
          - not_null

      - name: offer_type
        description: "Offer type e.g. on_demand, reserved, bid"
        tests:
          - not_null

      - name: offer_id
        description: "Vast.ai offer identifier"
        tests:
          - not_null

      - name: machine_id
        description: "Vast.ai machine identifier"
        tests:
          - not_null

      - name: host_id
        description: "Vast.ai host identifier"
        tests:
          - not_null

      - name: country_code
        description: "ISO country code extracted from geolocation"
        tests:
          - not_null:
              config:
                severity: warn

      - name: reliability_score
        description: "Vast.ai host reliability score"

      - name: gpu_architecture
        description: "GPU architecture family e.g. nvidia"
        tests:
          - not_null

      - name: gpu_model_name
        description: "GPU model name e.g. RTX 4090"
        tests:
          - not_null

      - name: number_of_gpus
        description: "Number of GPUs in the offer"
        tests:
          - not_null

      - name: tflops_per_gpu
        description: "TFLOPS per GPU"

      - name: total_system_tflops
        description: "Total TFLOPS across all GPUs in the offer"

      - name: gpu_memory_gb
        description: "GPU VRAM in gigabytes"

      - name: gpu_tdp_watts
        description: "GPU TDP per GPU in watts"

      - name: gpu_bandwidth_gbytes_per_sec
        description: "GPU memory bandwidth in GB/s"

      - name: gpu_max_cuda_version_supported
        description: "Maximum CUDA version supported"

      - name: cpu_architecture
        description: "CPU architecture e.g. amd64"

      - name: cpu_model_name
        description: "CPU model name"

      - name: number_of_cpu_cores
        description: "Number of CPU cores"

      - name: cpu_clock_speed_ghz
        description: "CPU clock speed in GHz"

      - name: ram_gb
        description: "System RAM in gigabytes"

      - name: disk_space_gb
        description: "Available disk space in gigabytes"

      - name: disk_bandwidth_gbytes_per_sec
        description: "Disk bandwidth in GB/s"

      - name: pcie_generation
        description: "PCIe generation"

      - name: pcie_bandwidth_gbytes_per_sec
        description: "PCIe bandwidth in GB/s"

      - name: network_download_mbits_per_sec
        description: "Network download speed in Mbits/s"

      - name: network_upload_mbits_per_sec
        description: "Network upload speed in Mbits/s"

      - name: network_download_cost_usd_per_gbit
        description: "Network download cost per gigabit in USD"

      - name: network_upload_cost_usd_per_gbit
        description: "Network upload cost per gigabit in USD"

      - name: kwh_per_tflop
        description: "Energy efficiency ratio - kWh per TFLOP"

      - name: deep_learning_score
        description: "Vast.ai deep learning benchmark score"

      - name: deep_learning_score_per_usd
        description: "DL performance per dollar"

      - name: gpu_price_usd_per_hr
        description: "Base GPU rental cost in USD/hr"

      - name: minimum_bid_price_usd
        description: "Minimum bid price in USD"

      - name: storage_cost_usd_per_hr
        description: "Storage cost in USD/hr"

      - name: revenue_usd_per_hr
        description: "Total hourly revenue in USD"
        tests:
          - not_null

      - name: usd_to_mkd_rate
        description: "USD to MKD exchange rate locked at valid_from"

      - name: profit_household_1_high_usd_per_hr
        description: "Profit in USD/hr under household high tariff block 1"
      - name: profit_household_2_high_usd_per_hr
        description: "Profit in USD/hr under household high tariff block 2"
      - name: profit_household_3_high_usd_per_hr
        description: "Profit in USD/hr under household high tariff block 3"
      - name: profit_household_4_high_usd_per_hr
        description: "Profit in USD/hr under household high tariff block 4"
      - name: profit_household_low_usd_per_hr
        description: "Profit in USD/hr under household low tariff"
      - name: profit_business_high_usd_per_hr
        description: "Profit in USD/hr under business high tariff"
      - name: profit_business_low_usd_per_hr
        description: "Profit in USD/hr under business low tariff"

      - name: profit_per_tflop_household_1_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 1"
      - name: profit_per_tflop_household_2_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 2"
      - name: profit_per_tflop_household_3_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 3"
      - name: profit_per_tflop_household_4_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 4"
      - name: profit_per_tflop_household_low_usd
        description: "Profit per TFLOP in USD under household low tariff"
      - name: profit_per_tflop_business_high_usd
        description: "Profit per TFLOP in USD under business high tariff"
      - name: profit_per_tflop_business_low_usd
        description: "Profit per TFLOP in USD under business low tariff"

      - name: valid_from
        description: "Timestamp of the offer snapshot"
        tests:
          - not_null

  - name: mart_best_offers_by_gpu
    description: >
      Best available on-demand or reserved offer per GPU model, deduped to the latest snapshot.
      Filtered to verified, rentable, unrented offers. All metrics normalized per GPU.
      One row per (gpu_architecture, gpu_model_name).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - offer_type
            - gpu_model_name
            - tflops_per_gpu
            - gpu_tdp_watts
            - gpu_memory_gb
    columns:
      - name: offer_type
        description: "Offer type e.g. on_demand, reserved, bid"
        tests:
          - not_null

      - name: gpu_architecture
        description: "GPU architecture family e.g. nvidia"
        tests:
          - not_null

      - name: gpu_model_name
        description: "GPU model name e.g. RTX 4090"
        tests:
          - not_null

      - name: gpu_memory_gb
        description: "GPU VRAM in gigabytes"

      - name: gpu_tdp_watts
        description: "GPU TDP in watts"

      - name: gpu_bandwidth_gbytes_per_sec
        description: "GPU memory bandwidth in GB/s"

      - name: gpu_max_cuda_version_supported
        description: "Maximum CUDA version supported"

      - name: tflops_per_gpu
        description: "TFLOPS normalized per GPU (total_tflops_available / number_of_gpus)"
        tests:
          - not_null:
              config:
                severity: warn

      - name: kwh_per_tflop
        description: "Energy efficiency ratio - kWh per TFLOP"

      - name: verification_flag
        description: "Vast.ai host verification status"

      - name: rentable_flag
        description: "Whether the offer is currently rentable"

      - name: rented_flag
        description: "Whether the offer is currently rented"

      - name: reliability_score
        description: "Vast.ai host reliability score"

      - name: country_code
        description: "ISO country code of the host"

      - name: revenue_per_gpu_usd_per_hr
        description: "Revenue per GPU in USD/hr"

      - name: cost_household_1_high_per_gpu_usd_per_hr
        description: "Electricity cost per GPU in USD/hr under household high tariff block 1"
      - name: cost_household_2_high_per_gpu_usd_per_hr
        description: "Electricity cost per GPU in USD/hr under household high tariff block 2"
      - name: cost_household_3_high_per_gpu_usd_per_hr
        description: "Electricity cost per GPU in USD/hr under household high tariff block 3"
      - name: cost_household_4_high_per_gpu_usd_per_hr
        description: "Electricity cost per GPU in USD/hr under household high tariff block 4"
      - name: cost_household_low_per_gpu_usd_per_hr
        description: "Electricity cost per GPU in USD/hr under household low tariff"
      - name: cost_business_high_per_gpu_usd_per_hr
        description: "Electricity cost per GPU in USD/hr under business high tariff"
      - name: cost_business_low_per_gpu_usd_per_hr
        description: "Electricity cost per GPU in USD/hr under business low tariff"

      - name: profit_household_1_high_per_gpu_usd_per_hr
        description: "Profit per GPU in USD/hr under household high tariff block 1"
      - name: profit_household_2_high_per_gpu_usd_per_hr
        description: "Profit per GPU in USD/hr under household high tariff block 2"
      - name: profit_household_3_high_per_gpu_usd_per_hr
        description: "Profit per GPU in USD/hr under household high tariff block 3"
      - name: profit_household_4_high_per_gpu_usd_per_hr
        description: "Profit per GPU in USD/hr under household high tariff block 4"
      - name: profit_household_low_per_gpu_usd_per_hr
        description: "Profit per GPU in USD/hr under household low tariff"
      - name: profit_business_high_per_gpu_usd_per_hr
        description: "Profit per GPU in USD/hr under business high tariff"
      - name: profit_business_low_per_gpu_usd_per_hr
        description: "Profit per GPU in USD/hr under business low tariff"

      - name: profit_per_tflop_household_1_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 1"
      - name: profit_per_tflop_household_2_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 2"
      - name: profit_per_tflop_household_3_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 3"
      - name: profit_per_tflop_household_4_high_usd
        description: "Profit per TFLOP in USD under household high tariff block 4"
      - name: profit_per_tflop_household_low_usd
        description: "Profit per TFLOP in USD under household low tariff"
      - name: profit_per_tflop_business_high_usd
        description: "Profit per TFLOP in USD under business high tariff"
      - name: profit_per_tflop_business_low_usd
        description: "Profit per TFLOP in USD under business low tariff"

      - name: ingested_at
        description: "Timestamp of the latest snapshot for this GPU model"
        tests:
          - not_null

  - name: mart_profitability_trends
    description: >
      Hourly aggregated offer-level profitability metrics grouped by GPU variant and tariff window.
      Joins fct_compute_offers to dim_electricity_tariffs_schedule to label each hour as high
      or low tariff. Metrics are raw offer-level averages (not per-GPU normalized) - use
      mart_best_offers_by_gpu or mart_gpu_model_summary for per-GPU comparisons.
      One row per (hour_bucket, offer_type, gpu_architecture, gpu_model_name, gpu_memory_gb,
      gpu_tdp_watts, gpu_bandwidth_gbytes_per_sec, gpu_max_cuda_version_supported, tariff_window).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - hour_bucket
            - offer_type
            - gpu_architecture
            - gpu_model_name
            - gpu_memory_gb
            - gpu_tdp_watts
            - gpu_bandwidth_gbytes_per_sec
            - gpu_max_cuda_version_supported
            - number_of_gpus
            - tariff_window
    columns:
      - name: hour_bucket
        description: "Timestamp truncated to the hour"
        tests:
          - not_null
      - name: day_of_week
        description: "ISO day of week - 1=Monday through 7=Sunday"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1 and day_of_week <= 7"
      - name: hour_of_day
        description: "Hour of day (0-23)"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and hour_of_day < 24"
      - name: tariff_window
        description: "Tariff tier active at this hour - low or high"
        tests:
          - accepted_values:
              values: [ 'low', 'high' ]
              config:
                severity: warn
      - name: offer_type
        description: "Offer type e.g. on_demand, reserved, bid"
        tests:
          - not_null
      - name: gpu_architecture
        description: "GPU architecture family"
        tests:
          - not_null
      - name: gpu_model_name
        description: "GPU model name"
        tests:
          - not_null
      - name: gpu_memory_gb
        description: "GPU VRAM in gigabytes - part of grain to separate RTX 4090 16GB vs 32GB"
      - name: gpu_tdp_watts
        description: "GPU TDP in watts - part of grain"
      - name: gpu_bandwidth_gbytes_per_sec
        description: "GPU memory bandwidth in GB/s - part of grain"
      - name: gpu_max_cuda_version_supported
        description: "Maximum CUDA version supported - part of grain"
      - name: number_of_gpus
        description: "Number of GPUs - part of grain"
      - name: offer_count
        description: "Number of offer snapshots in this group"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: avg_revenue_usd_per_hr
        description: "Average offer revenue in USD/hr"
      - name: avg_profit_household_1_high_usd_per_hr
        description: "Average offer profit in USD/hr under household high tariff block 1"
      - name: avg_profit_household_2_high_usd_per_hr
        description: "Average offer profit in USD/hr under household high tariff block 2"
      - name: avg_profit_household_3_high_usd_per_hr
        description: "Average offer profit in USD/hr under household high tariff block 3"
      - name: avg_profit_household_4_high_usd_per_hr
        description: "Average offer profit in USD/hr under household high tariff block 4"
      - name: avg_profit_household_low_usd_per_hr
        description: "Average offer profit in USD/hr under household low tariff"
      - name: avg_profit_business_high_usd_per_hr
        description: "Average offer profit in USD/hr under business high tariff"
      - name: avg_profit_business_low_usd_per_hr
        description: "Average offer profit in USD/hr under business low tariff"
      - name: min_profit_household_1_high_usd_per_hr
        description: "Minimum offer profit in USD/hr under household high tariff block 1"
      - name: min_profit_household_2_high_usd_per_hr
        description: "Minimum offer profit in USD/hr under household high tariff block 2"
      - name: min_profit_household_3_high_usd_per_hr
        description: "Minimum offer profit in USD/hr under household high tariff block 3"
      - name: min_profit_household_4_high_usd_per_hr
        description: "Minimum offer profit in USD/hr under household high tariff block 4"
      - name: min_profit_household_low_usd_per_hr
        description: "Minimum offer profit in USD/hr under household low tariff"
      - name: min_profit_business_high_usd_per_hr
        description: "Minimum offer profit in USD/hr under business high tariff"
      - name: min_profit_business_low_usd_per_hr
        description: "Minimum offer profit in USD/hr under business low tariff"
      - name: max_profit_household_1_high_usd_per_hr
        description: "Maximum offer profit in USD/hr under household high tariff block 1"
      - name: max_profit_household_2_high_usd_per_hr
